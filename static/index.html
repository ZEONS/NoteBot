<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM 지식 비서 — EASYSAFE NoteBot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📚 <span>지식 비서</span></h1>
                <p>NotebookLM 스타일 AI 어시스턴트</p>
            </div>
            
            <div class="sidebar-section">
                <button id="new-note-btn" class="primary-btn">
                    <i class="fas fa-plus"></i> 새 노트 추가
                </button>
            </div>

            <div class="sidebar-section">
                <h3>📂 지식 소스 (<span id="note-count">0</span>)</h3>
                <div id="drop-zone" class="drop-zone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>파일을 여기에 드래그하세요</span>
                    <input type="file" id="file-upload" class="hidden" multiple accept=".md,.txt,.pdf">
                </div>
                <div id="notes-list" class="notes-list">
                    <!-- Notes will be injected here -->
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="settings-toggle" class="settings-btn">
                    <i class="fas fa-cog"></i> 설정 및 모델 관리
                </button>
            </div>
        </aside>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-sliders-h"></i> 시스템 설정</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="setting-item">
                        <label>Gemini API Key</label>
                        <div class="api-input-wrapper">
                            <input type="password" id="api-key-input" placeholder="AIza...">
                            <span class="visibility-toggle"><i class="fas fa-eye"></i></span>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label>기본 사용 모델</label>
                        <select id="model-select">
                            <option value="">모델 로딩 중...</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <button id="diag-btn" class="diag-btn">
                            <i class="fas fa-stethoscope"></i> API 연결 진단
                        </button>
                        <div id="diag-result" class="diag-result"></div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button id="save-key-btn" class="primary-btn">저장 및 적용</button>
                    <button class="secondary-btn close-modal">취소</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="current-note-info">
                    <span id="active-note-title">모든 노트 기반 Q&A</span>
                </div>
                <button id="clear-chat-btn" class="icon-btn" title="대화 초기화">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </header>

            <div id="chat-container" class="chat-container">
                <div class="welcome-msg">
                    <h2>안녕하세요! 지식 비서입니다. 📚</h2>
                    <p><code>./my_notes/</code> 폴더의 문서와 등록된 노트를 기반으로 답변해 드립니다.</p>
                </div>
                <!-- Chat messages will be injected here -->
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="궁금한 내용을 물어보세요..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <p class="input-hint">팁: [노트 제목] 형태로 출처가 표시됩니다.</p>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="note-modal" class="modal hidden">
        <div class="modal-content glass">
            <h2 id="modal-title">새 노트 만들기</h2>
            <input type="text" id="note-title-input" placeholder="노트 제목">
            <textarea id="note-content-input" placeholder="내용을 입력하세요..." rows="10"></textarea>
            <div class="modal-actions">
                <button id="cancel-note-btn" class="secondary-btn">취소</button>
                <button id="save-note-btn" class="primary-btn">저장</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal hidden">
        <div class="modal-content glass confirm-modal">
            <div style="font-size: 3rem; color: #ef4444; margin: 20px 0 16px;">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3>소스 삭제 확인</h3>
            <p id="delete-confirm-text" style="margin-top: 12px;">정말로 이 소스를 삭제하시겠습니까?</p>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 8px;">이 작업은 되돌릴 수 없습니다.</p>
            <div class="confirm-actions">
                <button id="cancel-delete-btn" class="btn-secondary">취소</button>
                <button id="confirm-delete-btn" class="btn-danger">삭제하기</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=3"></script>
</body>
</html>
